<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的 DevOps 實驗室</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; line-height: 1.6; }
        .status-badge {
            background-color: #27ae60;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-badge">GitHub Actions 自動部署成功</div>
        <h1>你好！這是我的網站</h1>
        <p>這是我第一次使用 GitHub Actions 實現 DevOps 自動化流程。只要我一改代碼，網頁就會自動更新！</p>
        <button onclick="alert('恭喜你學會了基礎自動化部署！')">點我測試</button>
    </div>

</body>
</html>
